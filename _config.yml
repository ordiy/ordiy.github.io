# ---------------------------------------------------------------
# Theme Core Configuration Settings
# See: https://theme-next.org/docs/theme-settings/
# ---------------------------------------------------------------

# If false, merge configs from `_data/next.yml` into default configuration (rewrite).
# If true, will fully override default configuration by options from `_data/next.yml` (override). Only for NexT settings.
# And if true, all config from default NexT `_config.yml` have to be copied into `next.yml`. Use if you know what you are doing.
# Useful if you want to comment some options from NexT `_config.yml` by `next.yml` without editing default config.


#config hexo theme
theme: next
# favicon
theme_config:
  favicon: images/favicon.ico

# URL
#=======>
pretty_urls:
  trailing_index: true
  trailing_html: true

# Writing
highlight:
  enable: true
  auto_detect: false
  line_number: true
  tab_replace: '  '
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

#=====


# Console reminder if new version released.
reminder: false

# Allow to cache content generation. Introduced in NexT v6.0.0.
cache:
  enable: false

# Remove unnecessary files after hexo generate.
minify: true


#===
url: https://ordiychen.github.io/
root: /

title:  Ordiy's Blog
author: Ordiy
#keywords: "Ordiy Blog"

language:
  - en
  - zh-cn

index_generator:
  order_by: -date

skip_render:
  - 'robots.txt'

new_post_name: blog/:title.md
default_layout: post

filename_case: 0
#是否预览草稿
render_drafts: false

post_asset_folder: false
relative_link: false

#highlight:
#  enable: true
#  line_number: true
#  auto_detect: false

timezone: UTC
date_format: YYYY-MM-DD
time_format: HH:mm:ss

per_page: 10
pagination_dir: page
category_generator:
  per_page: $per_page
  order_by: -title

deploy:
  type: git
  repo: https://github.com/ordiychen/ordiychen.github.io
  branch: master
  message: "Updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"

marked:
  # For preserve original quotes in code blocks.
  smartypants: false
  gfm: true

search:
  path: search.xml
  field: post
  content: true

permalink: posts/:title/
permalink_defaults:
  lang: en
# my config ====

scheme: Gemini