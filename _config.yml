# ---------------------------------------------------------------
# Theme Core Configuration Settings
# See: https://theme-next.org/docs/theme-settings/
# ---------------------------------------------------------------

# If false, merge configs from `_data/next.yml` into default configuration (rewrite).
# If true, will fully override default configuration by options from `_data/next.yml` (override). Only for NexT settings.
# And if true, all config from default NexT `_config.yml` have to be copied into `next.yml`. Use if you know what you are doing.
# Useful if you want to comment some options from NexT `_config.yml` by `next.yml` without editing default config.


#config hexo theme
theme: redefine

# favicon
theme_config:
  favicon: images/favicon.ico
  darkmode: true

# URL
#=======>
pretty_urls:
  trailing_index: true
  trailing_html: true


# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

#hexo code style
syntax_highlighter: highlight.js
highlight:
  auto_detect: false
  line_number: true
  line_threshold: 0
  tab_replace: ""
  exclude_languages:
    - example
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  line_threshold: 0
  tab_replace: ""




# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

#=====


# Console reminder if new version released.
reminder: false

# Allow to cache content generation. Introduced in NexT v6.0.0.
cache:
  enable: false

# Remove unnecessary files after hexo generate.
minify: true


#===
url: https://ordiy.github.io/
root: /

title:  Ordiy's Blog
author: Ordiy
#keywords: "Ordiy Blog"

language:
  - en
  - zh-cn

index_generator:
  order_by: -date

skip_render:
  - 'robots.txt'



timezone: UTC
date_format: YYYY-MM-DD
time_format: HH:mm:ss

per_page: 10
pagination_dir: page
category_generator:
  per_page: $per_page
  order_by: -title

deploy:
  type: git
  repo: https://github.com/ordiy/ordiy.github.io.git
  branch: gh-pages
  message: "Updated: {{ now('YYYY-MM-DD HH:mm:ss') }}"

marked:
  # For preserve original quotes in code blocks.
  smartypants: false
  breaks: false
  gfm: true #Enable GFM line breaks. This option requires the gfm option to be true.

# search:
#   path: search.xml
#   field: post
#   content: true

search:
  path: search.json
  field: post
  content: true
  template: ./search.xml

permalink: posts/:title/
permalink_defaults:
  lang: en
# my config ====

##next theme config
social:
  GitHub: https://github.com/ordiy || fab fa-github
  E-Mail: mailto:chenpx1224@gmail.com || fa fa-envelope

mediumzoom: false


